version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kubetix:kubetix@db:5432/kubetix
      - KUBETIX_SECRET_KEY=${KUBETIX_SECRET_KEY:-dev-secret-key-change-in-production}
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./data:/app/data
      - ~/.kube:/root/.kube:ro
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=kubetix
      - POSTGRES_PASSWORD=kubetix
      - POSTGRES_DB=kubetix
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ../kubetix-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
